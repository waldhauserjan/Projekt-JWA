<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Workshop Timer</title>

  <style>
    :root {
      --bg: #0b1220;
      --fg: #20C997;     /* <-- barva hlavního času (tyrkys) */
      --accent: #4ade80;
      --danger: #fb7185;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--fg);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    .wrap {
      text-align: center;
      padding: 24px;
    }

    
.buttons{
  display:flex;
  height: 44px;
  gap:12px;
  justify-content:center;
  margin-top:16px;
  flex-wrap:wrap;
}


    .label {
      opacity: .75;
      letter-spacing: .06em;
      text-transform: uppercase;
      font-size: 14px;
      margin-bottom: 12px;
      color: rgba(230, 238, 252, 0.75);
    }

    #time {
      font-variant-numeric: tabular-nums;
      font-size: clamp(72px, 14vw, 160px);
      font-weight: 800;
      line-height: 1;
      padding: 18px 28px;
      border-radius: 18px;
      border: 2px solid rgba(230, 238, 252, 0.12);
      background: rgba(255, 255, 255, 0.04);
      box-shadow: 0 12px 45px rgba(0,0,0,.35);
      color: var(--fg); /* hlavní čísla timeru */
    }

    .running #time {
      border-color: rgba(74, 222, 128, 0.35);
    }

    .done #time {
      border-color: rgba(251, 113, 133, 0.55);
      background: rgba(251, 113, 133, 0.12);
      color: #ffd1d9;
      animation: pulse 900ms ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
.buttons button {
  padding: 10px 16px;
  border-radius: 12px;
  border: 1px solid rgba(230, 238, 252, 0.18);
  background: rgba(255, 255, 255, 0.06);
  color: rgba(230, 238, 252, 0.92);
  font-weight: 700;
  cursor: pointer;
}

.buttons button:hover {
  background: rgba(255, 255, 255, 0.10);
}

.buttons button:active {
  transform: translateY(1px);
}

.buttons button:focus-visible {
  outline: 3px solid rgba(45, 212, 191, 0.5);
  outline-offset: 3px;
}

  </style>
</head>

<body>
  <div class="wrap running" id="state">
    <div class="label">Workshop timer</div>
    <div id="time" aria-live="polite">15:00</div>
  
<div class="buttons">
  <button id="restartBtn" type="button">Restart</button>
  <button id="addMinBtn" type="button">+1 minuta</button>
</div>

    <div class="hint">Načtení/refresh = start od 15:00</div>
  </div>

  <script>
    // Nastavení: 15 minut
    const DURATION_SECONDS = 15 * 60;

    const stateEl = document.getElementById("state");
    const timeEl = document.getElementById("time");
    const restartBtn = document.getElementById("restartBtn");

    let endAt = 0;
    let timerId = null;

    function formatMMSS(totalSeconds) {
      const s = Math.max(0, Math.floor(totalSeconds));
      const mm = String(Math.floor(s / 60)).padStart(2, "0");
      const ss = String(s % 60).padStart(2, "0");
      return `${mm}:${ss}`;
    }

    function tick() {
      const remainingMs = endAt - Date.now();
      const remainingSeconds = Math.ceil(remainingMs / 1000);

      timeEl.textContent = formatMMSS(remainingSeconds);

      if (remainingMs <= 0) {
        timeEl.textContent = "00:00";
        stateEl.classList.remove("running");
        stateEl.classList.add("done");

        if (timerId) clearInterval(timerId);
        timerId = null;
      }
    }

    function startTimer() {
      endAt = Date.now() + DURATION_SECONDS * 1000;

      stateEl.classList.add("running");
      stateEl.classList.remove("done");

      if (timerId) clearInterval(timerId);
      timerId = setInterval(tick, 250);

      tick(); // vykresli hned
    }

    restartBtn.addEventListener("click", startTimer);

    // Auto-start při načtení stránky
    startTimer();
  </script>
</body>
</html>
